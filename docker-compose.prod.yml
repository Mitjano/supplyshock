# Production compose — no bind mounts, no dev ports exposed
# Deploy: docker compose -f docker-compose.prod.yml pull && up -d

services:

  db:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: supplyshock
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPO}/backend:${IMAGE_TAG:-latest}
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/supplyshock
      DATABASE_URL_SYNC: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/supplyshock
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      sh -c "alembic upgrade head &&
             gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker
             --bind 0.0.0.0:8000 --timeout 120"

  celery:
    image: ghcr.io/${GITHUB_REPO}/backend:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/supplyshock
      DATABASE_URL_SYNC: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/supplyshock
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A simulation.tasks inspect ping --timeout 5 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: celery -A simulation.tasks worker --loglevel=warning --concurrency=4

  celery-beat:
    image: ghcr.io/${GITHUB_REPO}/backend:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/supplyshock
      DATABASE_URL_SYNC: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/supplyshock
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      db:
        condition: service_healthy
    command: celery -A simulation.tasks beat --loglevel=warning

  frontend:
    image: ghcr.io/${GITHUB_REPO}/frontend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

  # Automatic cert renewal
  certbot:
    image: certbot/certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

  # Daily backup to object storage
  backup:
    image: postgres:16-alpine
    restart: always
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    env_file:
      - .env.prod
    volumes:
      - ./infra/backup.sh:/backup.sh:ro
    depends_on:
      - db
    command: crond -f -l 8
    entrypoint: >
      sh -c "echo '0 3 * * * /backup.sh' | crontab - && crond -f -l 8"

volumes:
  db_data:
  redis_data:
