version: "3.9"

services:

  # ── Database (PostgreSQL 16 + TimescaleDB) ─────────────
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: supplyshock
      POSTGRES_PASSWORD: supplyshock_dev
      POSTGRES_DB: supplyshock
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplyshock"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (cache + Celery broker) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://supplyshock:supplyshock_dev@db:5432/supplyshock
      DATABASE_URL_SYNC: postgresql://supplyshock:supplyshock_dev@db:5432/supplyshock
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Celery Worker ───────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://supplyshock:supplyshock_dev@db:5432/supplyshock
      DATABASE_URL_SYNC: postgresql://supplyshock:supplyshock_dev@db:5432/supplyshock
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A simulation.tasks worker --loglevel=info --concurrency=2

  # ── Celery Beat (scheduled ingestion tasks) ─────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://supplyshock:supplyshock_dev@db:5432/supplyshock
      DATABASE_URL_SYNC: postgresql://supplyshock:supplyshock_dev@db:5432/supplyshock
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A simulation.tasks beat --loglevel=info

  # ── Frontend (Vue 3 + Vite) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_MAPBOX_TOKEN: ${MAPBOX_ACCESS_TOKEN}
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  db_data:
