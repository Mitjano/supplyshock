<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;padding:40px 20px">
  <tr><td style="text-align:center;padding-bottom:32px">
    <h1 style="color:#f1f5f9;font-size:28px;margin:0">SupplyShock</h1>
  </td></tr>
  <tr><td style="background:#1e293b;border:1px solid #dc2626;border-radius:12px;padding:32px">
    <div style="display:inline-block;background:#dc2626;color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:4px;text-transform:uppercase;margin-bottom:16px">
      {{ severity | upper }}
    </div>
    <h2 style="color:#f1f5f9;margin:0 0 12px">{{ title }}</h2>
    <p style="color:#94a3b8;font-size:15px;line-height:1.6;margin:0 0 16px">
      {{ description }}
    </p>
    {% if commodity %}
    <table style="width:100%;margin-bottom:16px">
      <tr>
        <td style="color:#64748b;font-size:13px;padding:4px 0">Commodity</td>
        <td style="color:#cbd5e1;font-size:13px;padding:4px 0;text-align:right">{{ commodity }}</td>
      </tr>
      {% if region %}
      <tr>
        <td style="color:#64748b;font-size:13px;padding:4px 0">Region</td>
        <td style="color:#cbd5e1;font-size:13px;padding:4px 0;text-align:right">{{ region }}</td>
      </tr>
      {% endif %}
      <tr>
        <td style="color:#64748b;font-size:13px;padding:4px 0">Time</td>
        <td style="color:#cbd5e1;font-size:13px;padding:4px 0;text-align:right">{{ timestamp }}</td>
      </tr>
    </table>
    {% endif %}
    <table cellpadding="0" cellspacing="0" style="margin:0 auto">
      <tr><td style="background:#3b82f6;border-radius:8px;padding:14px 32px">
        <a href="{{ app_url }}/map" style="color:#fff;text-decoration:none;font-weight:600;font-size:16px">
          View on Map
        </a>
      </td></tr>
    </table>
  </td></tr>
  <tr><td style="text-align:center;padding-top:24px">
    <p style="color:#475569;font-size:13px;margin:0">
      You receive this because you subscribed to {{ alert_type }} alerts.
      <a href="{{ app_url }}/settings" style="color:#64748b">Manage subscriptions</a>
    </p>
  </td></tr>
</table>
</body>
</html>
